<!-- SECTION COURS QUOTIDIENS -->
<section id="sec-courses" class="tab-content hidden max-w-4xl mx-auto space-y-6">
    <div class="glass p-6 rounded-2xl">
        <h2 class="text-2xl font-bold text-indigo-400 mb-4"><i class="fa-solid fa-graduation-cap mr-2"></i>Cours du Jour</h2>
        
        <!-- Sélecteur de jour -->
        <div class="mb-6 flex gap-2 flex-wrap">
            <select id="day-selector" class="glass px-4 py-2 rounded-lg text-white border border-indigo-500 focus:outline-none focus:border-cyan-400">
                <option value="">Choisir un jour...</option>
            </select>
            <button onclick="loadTodayLesson()" class="glass px-4 py-2 rounded-lg bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 transition">
                📅 Aujourd'hui
            </button>
        </div>

        <!-- Contenu du cours -->
        <div id="course-content" class="glass p-6 rounded-xl space-y-4">
            <h3 id="course-title" class="text-xl font-bold text-cyan-400"></h3>
            <div id="course-theory" class="space-y-3 text-slate-300"></div>
            
            <!-- Exemple de code -->
            <div id="course-example" class="glass p-4 rounded-lg bg-slate-900 mt-4">
                <p class="text-sm text-indigo-300 mb-2">📝 Exemple :</p>
                <pre id="course-code" class="text-xs text-green-400 overflow-x-auto"></pre>
            </div>
        </div>

        <!-- Bouton test -->
        <button onclick="goToTest()" class="w-full mt-6 glass px-6 py-3 rounded-lg bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 transition font-bold">
            ✅ Tester ma compréhension
        </button>
    </div>
</section>

<!-- SECTION TESTS -->
<section id="sec-tests" class="tab-content hidden max-w-4xl mx-auto space-y-6">
    <div class="glass p-6 rounded-2xl">
        <h2 class="text-2xl font-bold text-yellow-400 mb-4"><i class="fa-solid fa-flask mr-2"></i>Test du Jour</h2>
        
        <div id="test-content" class="space-y-6">
            <!-- Les questions s'affichent ici dynamiquement -->
        </div>

        <!-- Boutons action -->
        <div class="flex gap-4 mt-8">
            <button onclick="submitTest()" class="flex-1 glass px-6 py-3 rounded-lg bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 transition font-bold">
                ✅ Valider mes réponses
            </button>
            <button onclick="resetTest()" class="flex-1 glass px-6 py-3 rounded-lg bg-gradient-to-r from-slate-600 to-slate-700 hover:from-slate-500 hover:to-slate-600 transition font-bold">
                🔄 Recommencer
            </button>
        </div>

        <!-- Résultats -->
        <div id="test-results" class="hidden glass p-6 rounded-xl mt-6 space-y-4">
            <h3 id="result-title" class="text-2xl font-bold"></h3>
            <div id="result-details" class="space-y-3"></div>
            <button onclick="backToCourse()" class="w-full glass px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 transition">
                ← Retour au cours
            </button>
        </div>
    </div>
</section>
